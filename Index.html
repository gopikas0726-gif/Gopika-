<!DOCTYPE html>
<html>
<head>
    <title>Web Core 2026 Workshop</title>
</head>
<body>

<center>

<h2>Web Core 2026 –  Workshop</h2>

<p>
This form is used to collect student details for the Web Core 2026  workshop.
Participants should fill all the required information carefully.
</p>

<form>
    <label>Student Name:</label><br>
    <input type="text"><br><br>

    <label>Register Number:</label><br>
    <input type="text"><br><br>

    <label>Email:</label><br>
    <input type="email"><br><br>

    <label>Phone Number:</label><br>
    <input type="tel"><br><br>

    <label>College Name:</label><br>
    <input type="text"><br><br>

    <label>Department:</label><br>
    <input type="text"><br><br>

    <label>Year of Study:</label><br>
    <select>
        <option>First Year</option>
        <option>Second Year</option>
        <option>Third Year</option>
    </select><br><br>

    <label>Gender:</label><br>
    <input type="radio" name="g"> Male
    <input type="radio" name="g"> Female
    <input type="radio" name="g"> Other<br><br>

    <label>Skills Known:</label><br>
    <input type="checkbox"> HTML
    <input type="checkbox"> CSS
    <input type="checkbox"> JavaScript<br><br>

    <label>Workshop Mode:</label><br>
    <input type="radio" name="m"> Offline
    <input type="radio" name="m"> Online<br><br>

    <label>Comments:</label><br>
    <textarea rows="3" cols="30"></textarea><br><br>

    <input type="submit" value="Register">
    <input type="reset" value="Clear">
</form>

</center>

</body>
</html>
